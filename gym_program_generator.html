<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Program Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #f3701e;
    --red-dark: #d85f12;
    --bg: #171717;
    --bg2: #1d1d1d;
    --bg3: #252a34;
    --bg4: #4b607f;
    --border: #2a2a2a;
    --border2: #3a4455;
    --text: #e8d8c9;
    --text2: #b8ab9f;
    --text3: #7f8896;
    --ink: #111111;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { background: var(--bg); }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOP BAR */
  .topbar { background: #141414; border-bottom: 1px solid var(--border2); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-family: 'Oswald', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--text); }
  .topbar-logo span { color: var(--red); }
  .topbar-actions { display: flex; gap: 10px; }
  .btn { padding: 9px 18px; border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
  .btn-outline:hover { border-color: var(--red); color: var(--red); }
  .btn-primary { background: var(--red); color: var(--ink); }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-danger { background: transparent; border: 1px solid #444; color: #888; font-size: 12px; padding: 6px 12px; }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }

  /* LAYOUT */
  .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
  .section-label { font-size: 11px; color: var(--red); letter-spacing: 2px; font-family: 'Oswald', sans-serif; margin-bottom: 8px; }

  /* TRAINER + CLIENT INFO */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .info-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .info-card h3 { font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 1px; color: var(--text2); margin-bottom: 16px; }
  .field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-row label { font-size: 11px; color: var(--text3); letter-spacing: 1px; }
  .field-row input, .field-row select, .field-row textarea {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: 'Inter', sans-serif;
    transition: border-color 0.15s; width: 100%;
  }
  .field-row input:focus, .field-row select:focus, .field-row textarea:focus {
    outline: none; border-color: var(--red);
  }
  .field-row input::placeholder { color: var(--text3); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* NOTES */
  .notes-section { margin-bottom: 32px; }
  .notes-section textarea { min-height: 80px; resize: vertical; line-height: 1.6; }

  /* DAYS */
  .days-section { margin-bottom: 24px; }
  .day-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: visible; }
  .day-header { background: var(--bg3); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .day-title { font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 2px; color: var(--red); display: flex; align-items: center; gap: 10px; }
  .day-title input { background: transparent; border: none; color: var(--red); font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 2px; width: 180px; outline: none; }
  .day-body { padding: 16px 20px; }

  /* EXERCISE TABLE */
  .ex-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .ex-table th { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-align: left; padding: 0 6px 8px; font-weight: 500; border-bottom: 1px solid var(--border); }
  .ex-table td { padding: 6px 4px; vertical-align: middle; }
  .ex-table tr:not(:last-child) td { border-bottom: 1px solid #1f1f1f; }
  .ex-table select, .ex-table input[type="text"] {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; padding: 6px 8px; font-size: 12px; font-family: 'Inter', sans-serif;
    width: 100%; transition: border-color 0.15s;
  }
  .ex-table select:focus, .ex-table input[type="text"]:focus { outline: none; border-color: var(--red); }
  .exercise-autocomplete { position: relative; }
  .exercise-input-wrap { position: relative; }
  .exercise-input-wrap input[type="text"] { padding-right: 34px; }
  .exercise-toggle {
    position: absolute;
    top: 50%;
    right: 6px;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }
  .exercise-toggle:hover { color: var(--red); }
  .exercise-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    max-height: 220px;
    overflow-y: auto;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.28);
    z-index: 20;
    padding: 6px;
  }
  .exercise-menu.is-open { display: block; }
  .exercise-option {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
  }
  .exercise-option:hover { background: var(--bg3); color: var(--red); }
  .exercise-empty {
    padding: 8px 10px;
    color: var(--text3);
    font-size: 12px;
  }
  .link-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(243,112,30,0.16);
    color: var(--red);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .ex-table tbody tr:not(.linked-row):nth-child(odd) td { background: var(--bg2); }
  .ex-table tbody tr:not(.linked-row):nth-child(even) td { background: #20252d; }
  .linked-row td { background: rgba(243,112,30,0.08); }
  .linked-row td:first-child { box-shadow: inset 3px 0 0 var(--red); }
  .linked-row.linked-alt td { background: rgba(232,216,201,0.1); }
  .linked-row.linked-alt td:first-child { box-shadow: inset 3px 0 0 #e8d8c9; }
  .linked-start td { border-bottom-color: transparent !important; }
  .linked-middle td {
    border-top-color: transparent !important;
    border-bottom-color: transparent !important;
  }
  .linked-end td { border-top-color: transparent !important; }
  .row-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
  }
  .note-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 5px 7px;
    border-radius: 999px;
    transition: color 0.15s, opacity 0.15s, border-color 0.15s, background 0.15s, transform 0.15s;
  }
  .note-btn:hover {
    color: var(--red);
    border-color: rgba(243,112,30,0.35);
    background: rgba(243,112,30,0.08);
    transform: translateY(-1px);
  }
  .note-btn.has-note {
    color: var(--red);
    border-color: rgba(243,112,30,0.45);
    background: rgba(243,112,30,0.12);
    box-shadow: inset 0 0 0 1px rgba(243,112,30,0.08);
  }
  .note-popover {
    display: none;
    position: absolute;
    right: 100%;
    top: 50%;
    transform: translate(-10px, -50%);
    width: 240px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    box-shadow: 0 14px 28px rgba(0,0,0,0.35);
    padding: 10px;
    z-index: 30;
  }
  .note-popover.is-open { display: block; }
  .note-popover-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .note-popover-title {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text3);
  }
  .note-close {
    background: transparent;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
  }
  .note-close:hover { color: var(--red); }
  .note-textarea {
    width: 100%;
    min-height: 88px;
    resize: vertical;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
  }
  .note-textarea:focus {
    outline: none;
    border-color: var(--red);
  }
  .ex-table .del-ex { background: transparent; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px; transition: opacity 0.15s; }
  .ex-table .del-ex:hover { opacity: 0.8; }
  .add-ex-btn { font-size: 12px; color: var(--red); background: transparent; border: 1px dashed #333; border-radius: 6px; padding: 7px 14px; cursor: pointer; transition: all 0.15s; }
  .add-ex-btn:hover { border-color: var(--red); background: rgba(243,112,30,0.08); }
  .day-footer { padding: 0 20px 16px; display: flex; justify-content: flex-end; }

  /* ADD DAY */
  .add-day-wrap { text-align: center; padding: 20px; border: 1px dashed #2a2a2a; border-radius: 8px; margin-bottom: 32px; }
  .add-day-btn { font-family: 'Oswald', sans-serif; letter-spacing: 1px; font-size: 14px; color: var(--text2); background: transparent; border: none; cursor: pointer; padding: 8px 20px; transition: color 0.15s; }
  .add-day-btn:hover { color: var(--red); }

  /* PRINT PREVIEW */
  .print-preview { display: none; }

  /* PRINT STYLES */
  @media print {
    @page {
      size: auto;
      margin: 0;
    }
    html, body, .print-preview, .pp {
      background: var(--bg) !important;
      color: var(--text) !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body { background: var(--bg) !important; color: var(--text) !important; margin: 0 !important; }
    .topbar, .no-print { display: none !important; }
    .print-preview { display: block !important; }
    .container { display: none; }
    .print-preview {
      padding: 9mm;
      min-height: 100vh;
      background: var(--bg) !important;
    }
    .pp {
      font-family: 'Oswald', sans-serif;
      min-height: calc(100vh - 18mm);
      width: 100%;
      background: var(--bg);
      padding-bottom: 9mm;
    }
    .pp-header { background: var(--bg); color: var(--text); padding: 28px 32px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border2); }
    .pp-trainer-name { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
    .pp-trainer-name span { color: var(--red); }
    .pp-contact { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.8; }
    .pp-title { font-size: 13px; letter-spacing: 3px; color: var(--red); text-align: right; margin-bottom: 6px; }
    .pp-client-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--border2); margin: 0; background: var(--bg); }
    .pp-client-cell { padding: 10px 14px; border-right: 1px solid var(--border2); }
    .pp-client-cell:last-child { border-right: none; }
    .pp-client-label { font-size: 9px; letter-spacing: 1px; color: var(--text3); margin-bottom: 3px; }
    .pp-client-val { font-size: 13px; font-weight: 600; color: var(--text); }
    .pp-notes { padding: 12px 16px; background: var(--bg); border-bottom: 2px solid var(--red); font-size: 11px; color: var(--text2); line-height: 1.7; font-family: 'Inter', sans-serif; }
    .pp-day {
      margin: 0 0 20px;
      padding-top: 8mm;
      break-inside: avoid;
      background: var(--bg);
    }
    .pp-day-header { background: var(--bg3); color: var(--text); padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border2); }
    .pp-day-num { color: var(--red); font-size: 18px; font-weight: 700; }
    .pp-day-name { font-size: 13px; letter-spacing: 2px; }
    .pp-table { width: 100%; border-collapse: collapse; font-family: 'Inter', sans-serif; font-size: 11px; }
    .pp-table th { background: var(--bg3); color: var(--text2); padding: 6px 10px; text-align: left; font-size: 9px; letter-spacing: 1px; font-weight: 500; border-bottom: 1px solid var(--border2); }
    .pp-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); background: var(--bg2); }
    .pp-exercise-note {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      line-height: 1.45;
      color: var(--text2);
      font-weight: 400;
    }
    .pp-table tr:nth-child(even) td { background: #20252d; }
  .pp-table tr.pp-linked td { background: rgba(243,112,30,0.08) !important; }
  .pp-table tr.pp-linked td:first-child { box-shadow: inset 4px 0 0 var(--red); }
  .pp-table tr.pp-linked.pp-linked-alt td { background: rgba(232,216,201,0.08) !important; }
  .pp-table tr.pp-linked.pp-linked-alt td:first-child { box-shadow: inset 4px 0 0 var(--text); }
    .pp-table tr.pp-linked td:first-child { border-bottom-color: transparent; }
    .pp-table tr.pp-link-start td { border-bottom-color: transparent; }
    .pp-table tr.pp-link-middle td {
      border-top-color: transparent;
      border-bottom-color: transparent;
    }
    .pp-table tr.pp-link-end td { border-top-color: transparent; }
    .pp-link-type {
      display: inline-block;
      min-width: 54px;
      padding: 2px 8px;
      border-radius: 0;
      background: transparent;
      color: #ff7a1a;
      font-size: 9px;
      text-align: center;
      letter-spacing: 1px;
      font-weight: 700;
    }
    .pp-post { padding: 12px 16px; background: var(--bg2); font-size: 11px; color: var(--text2); line-height: 1.7; font-family: 'Inter', sans-serif; border-top: 2px solid var(--red); margin-top: 24px; }
    .pp-footer { text-align: center; padding: 10px; font-size: 9px; color: var(--text3); letter-spacing: 1px; border-top: 1px solid var(--border2); margin-top: 28px; }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .info-grid { grid-template-columns: 1fr; }
    .topbar { padding: 12px 16px; }
    .container { padding: 20px 14px; }
    .topbar-logo { font-size: 16px; letter-spacing: 1px; }
    .day-header {
      padding: 14px;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }
    .day-title {
      width: 100%;
      align-items: flex-start;
      gap: 8px;
    }
    .day-title input {
      width: 100%;
      min-width: 0;
    }
    .day-header .btn-danger {
      width: 100%;
    }
    .day-body {
      padding: 14px;
    }
    .ex-table {
      display: block;
      margin-bottom: 16px;
    }
    .ex-table thead {
      display: none;
    }
    .ex-table tbody {
      display: block;
    }
    .ex-table tr {
      display: block;
      padding: 12px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .ex-table tr:not(:last-child) td {
      border-bottom: none;
    }
    .ex-table td {
      display: block;
      padding: 0;
      margin-bottom: 10px;
    }
    .ex-table td:last-child {
      margin-bottom: 0;
    }
    .ex-table td::before {
      content: attr(data-label);
      display: block;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .ex-table td:last-child::before {
      display: none;
    }
    .ex-table td[data-label="Delete"] {
      margin-top: 2px;
    }
    .ex-table td[data-label="Delete"] .del-ex {
      width: 100%;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text2);
    }
    .row-actions {
      justify-content: stretch;
      gap: 8px;
      flex-wrap: wrap;
    }
    .note-btn,
    .ex-table td[data-label="Delete"] .del-ex {
      width: 100%;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .note-popover {
      position: static;
      transform: none;
      width: 100%;
      margin-top: 8px;
    }
    .exercise-menu {
      position: static;
      margin-top: 8px;
      max-height: 180px;
    }
    .linked-row td:first-child {
      box-shadow: none;
    }
    .linked-row {
      border-left: 3px solid var(--red) !important;
    }
    .linked-start,
    .linked-middle,
    .linked-end {
      border-top-color: var(--border2) !important;
      border-bottom-color: var(--border2) !important;
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Armin Nabizadeh <span>·</span> PT</div>
  <div class="topbar-actions">
    <button class="btn btn-outline" onclick="window.print()">⬇ Export PDF</button>
  </div>
</div>

<div class="container" id="app">

  <!-- TRAINER INFO -->
  <div style="margin-bottom:32px;">
    <div class="section-label">TRAINER</div>
    <div class="info-card" style="grid-column: span 2;">
      <div class="three-col">
        <div class="field-row">
          <label>TRAINER NAME</label>
          <input type="text" id="trainerName" value="Armin Nabizadeh" readonly>
        </div>
        <div class="field-row">
          <label>PHONE / CONTACT</label>
          <input type="text" id="trainerPhone" value="+358 45 160 3940" readonly>
        </div>
        <div class="field-row">
          <label>EMAIL</label>
          <input type="text" id="trainerEmail" value="armin.nabizade@gmail.com" readonly>
        </div>
      </div>
    </div>
  </div>

  <!-- CLIENT INFO -->
  <div style="margin-bottom:32px;">
    <div class="section-label">CLIENT</div>
    <div class="info-card">
      <div class="two-col">
        <div class="field-row">
          <label>CLIENT NAME</label>
          <input type="text" id="clientName" placeholder="Client Full Name">
        </div>
        <div class="field-row">
          <label>START DATE</label>
          <input type="date" id="startDate">
        </div>
      </div>
      <div class="three-col" style="margin-top:10px;">
        <div class="field-row">
          <label>WEIGHT (kg)</label>
          <input type="number" id="clientWeight" placeholder="75">
        </div>
        <div class="field-row">
          <label>HEIGHT (cm)</label>
          <input type="number" id="clientHeight" placeholder="175">
        </div>
        <div class="field-row">
          <label>AGE</label>
          <input type="number" id="clientAge" placeholder="30">
        </div>
      </div>
    </div>
  </div>

  <!-- PRE-WORKOUT -->
  <div class="notes-section">
    <div class="section-label">PRE-WORKOUT NOTES</div>
    <div class="info-card" style="padding:16px;">
      <textarea id="preWorkout" placeholder="e.g. Warm up for 5–10 minutes. Focus on mind-muscle connection and breathing..." style="background:transparent;border:none;color:var(--text);font-size:13px;width:100%;min-height:80px;resize:vertical;line-height:1.7;font-family:'Inter',sans-serif;outline:none;"></textarea>
    </div>
  </div>

  <!-- DAYS -->
  <div class="days-section" id="daysContainer" style="margin-top:28px;">
    <div class="section-label" style="margin-bottom:16px;">TRAINING DAYS</div>
  </div>

  <div class="add-day-wrap no-print">
    <button class="add-day-btn" onclick="addDay()">＋ ADD TRAINING DAY</button>
  </div>

  <!-- POST-WORKOUT -->
  <div class="notes-section">
    <div class="section-label">POST-WORKOUT & GENERAL NOTES</div>
    <div class="info-card" style="padding:16px;">
      <textarea id="postWorkout" placeholder="e.g. Cool down and stretch target muscles. Focus on progressive overload each week..." style="background:transparent;border:none;color:var(--text);font-size:13px;width:100%;min-height:80px;resize:vertical;line-height:1.7;font-family:'Inter',sans-serif;outline:none;"></textarea>
    </div>
  </div>

</div>

<!-- PRINT PREVIEW (rendered on print) -->
<div class="print-preview" id="printArea"></div>

<script>
const TRAINER = {
  name: "Armin Nabizadeh",
  email: "armin.nabizade@gmail.com",
  phone: "+358 45 160 3940"
};

const SORTED_MUSCLES = Object.fromEntries(
  Object.entries(MUSCLES).map(([muscle, exercises]) => [
    muscle,
    [...new Set(exercises)].sort((a, b) => a.localeCompare(b))
  ])
);

const SETS = ["1","2","3","4","5","6"];
const REPS = ["4","5","6","8","10","12","15","20","6-8","8-10","10-12","12-15","15-20","10-8-6","12-10-8","20-15-10-15-20","15-12-10-15","15-12-8-8","12-10-8-6","10-8-6-4","5+5+5","7+7+7","10+10","3+3+2+2+1+1","AMRAP","Time-based"];
const LINK_TYPES = ["","Superset","Triset","Giant Set"];
const TECHNIQUES = ["Standard","Straight Sets","Drop Set","LS: Drop Set","Pyramid","Rest-Pause","Alt. Rest Pause","21","Finisher","Feeder","Cluster Set","Time Under Tension","Circuit"];
const TEMPO = ["Controlled","2-0-2","3-1-2","4-0-1","Explosive","1-0-1","2-1-2","Slow Eccentric","Peak Contraction Pause"];
const REST = ["30s","45s","60s","90s","2 min","3 min","No Rest","As needed"];
const FIELD_OPTIONS = {
  sets: SETS,
  reps: REPS,
  tempo: TEMPO,
  rest: REST,
  technique: TECHNIQUES
};

const STORAGE_KEY = "gym-program-generator-state-v1";
let dayCount = 0;
let exerciseCount = 0;

function muscleOptions(selected='') {
  return Object.keys(SORTED_MUSCLES).map(m => `<option value="${m}" ${m===selected?'selected':''}>${m}</option>`).join('');
}

function exerciseOptions(muscle) {
  return SORTED_MUSCLES[muscle] || [];
}

function presetOptions(role, row) {
  if (role === "exercise") {
    return exerciseOptions(getRowValue(row, "muscle"));
  }
  return FIELD_OPTIONS[role] || [];
}

function selectOpts(arr, selected='', placeholder='') {
  const ph = placeholder ? `<option value="">${placeholder}</option>` : '';
  return ph + arr.map(v => `<option value="${v}" ${v===selected?'selected':''}>${v}</option>`).join('');
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function formatMultilineText(value) {
  return escapeHtml(value).replace(/\n/g, "<br>");
}

function getRowLinkKey(row) {
  const linkType = row.querySelector('[data-role="link-type"]')?.value || '';
  return linkType || '';
}

function getLinkGroupSize(linkType) {
  if (linkType === "Superset") return 2;
  if (linkType === "Triset") return 3;
  if (linkType === "Giant Set") return 4;
  return 1;
}

function getRowValue(row, role) {
  return row.querySelector(`[data-role="${role}"]`)?.value || '';
}

function getExerciseName(row) {
  return getRowValue(row, "exercise").trim() || "—";
}

}

  const state = {
    dayCount,

      name: document.getElementById("clientName").value,
      startDate: document.getElementById("startDate").value,
      weight: document.getElementById("clientWeight").value,

function restoreExerciseRow(row, rowData) {
  row.querySelector('[data-role="muscle"]').value = rowData.muscle || "";
  updateExercises(row.querySelector('[data-role="muscle"]'), row.id);
  row.querySelector('[data-role="exercise"]').value = rowData.exercise || "";
  row.querySelector('[data-role="sets"]').value = rowData.sets || "3";
  row.querySelector('[data-role="reps"]').value = rowData.reps || "10";
  row.querySelector('[data-role="tempo"]').value = rowData.tempo || "Controlled";
  row.querySelector('[data-role="rest"]').value = rowData.rest || "60s";
  row.querySelector('[data-role="link-type"]').value = rowData.linkType || "";
  row.querySelector('[data-role="technique"]').value = rowData.technique || "Standard";
  row.querySelector('[data-role="note"]').value = rowData.note || "";
  updateNoteState(row.id);
  syncRowState(row);
}

function restoreState() {
  const rawState = localStorage.getItem(STORAGE_KEY);
  if (!rawState) {
    addDay();
    return;
  }

  try {
    const state = JSON.parse(rawState);
    dayCount = 0;
    exerciseCount = 0;

    document.getElementById("clientName").value = state.client?.name || "";
    document.getElementById("startDate").value = state.client?.startDate || "";
    document.getElementById("clientWeight").value = state.client?.weight || "";
    document.getElementById("clientHeight").value = state.client?.height || "";
    document.getElementById("clientAge").value = state.client?.age || "";
    document.getElementById("preWorkout").value = state.client?.preWorkout || "";
    document.getElementById("postWorkout").value = state.client?.postWorkout || "";

    if (Array.isArray(state.days) && state.days.length) {
      state.days.forEach(dayData => {
        addDay();
        const day = document.querySelector(".day-card:last-child");
        day.querySelector(".day-title input").value = dayData.name || "";
        const tbody = day.querySelector("tbody");
        tbody.innerHTML = "";

        (dayData.exercises || []).forEach(exerciseData => {
          const row = addExercise(day.id, false);
          restoreExerciseRow(row, exerciseData);
        });

        if (!dayData.exercises?.length) addExercise(day.id, false);
      });
      exerciseCount = Math.max(exerciseCount, state.exerciseCount || 0);
      updateDayNumbers();
      saveState();
    } else {
      addDay();
    }
  } catch (error) {
    console.error("Failed to restore saved program", error);
    addDay();
  }
}

function refreshDayLinkStates(dayId) {
  const tbody = document.getElementById('tbody-' + dayId);
  if (!tbody) return;

  const rows = Array.from(tbody.querySelectorAll('tr'));
  rows.forEach(row => {
    row.classList.remove('linked-row', 'linked-start', 'linked-middle', 'linked-end', 'linked-alt');
  });

  let index = 0;
  let visualGroupIndex = 0;
  while (index < rows.length) {
    const row = rows[index];
    const linkKey = getRowLinkKey(row);
    if (!linkKey) {
      index += 1;
      continue;
    }

    const groupSize = getLinkGroupSize(linkKey);
    const groupRows = [];
    let cursor = index;

    while (cursor < rows.length && groupRows.length < groupSize && getRowLinkKey(rows[cursor]) === linkKey) {
      groupRows.push(rows[cursor]);
      cursor += 1;
    }

    if (groupRows.length === 1) {
      groupRows[0].classList.add('linked-row');
      if (visualGroupIndex % 2 === 1) groupRows[0].classList.add('linked-alt');
      visualGroupIndex += 1;
      index += 1;
      continue;
    }

    groupRows.forEach((groupRow, groupIndex) => {
      groupRow.classList.add('linked-row');
      if (visualGroupIndex % 2 === 1) groupRow.classList.add('linked-alt');
      if (groupIndex === 0) groupRow.classList.add('linked-start');
      else if (groupIndex === groupRows.length - 1) groupRow.classList.add('linked-end');
      else groupRow.classList.add('linked-middle');
    });

    visualGroupIndex += 1;
    index += groupRows.length;
  }
}

function syncRowState(row) {

function renderAutocompleteMenu(exId, role, forceOpen = false, showAll = false) {
  const row = document.getElementById(exId);
  if (!row) return;
  const input = row.querySelector(`[data-role="${role}"]`);
  const menu = document.getElementById(`${role}-menu-${exId}`);
  if (!input || !menu) return;

  const rawInput = input.value.trim();
  const query = showAll ? "" : rawInput.toLowerCase();
  const optionsPool = presetOptions(role, row);
  const options = optionsPool.filter(option => option.toLowerCase().includes(query));
  const exactMatch = optionsPool.some(option => option.toLowerCase() === rawInput.toLowerCase());

  if (role === "exercise" && !getRowValue(row, "muscle")) {
    menu.innerHTML = '<div class="exercise-empty">Choose a muscle first</div>';
  } else {
    const customOption = rawInput && !exactMatch
      ? `<button type="button" class="exercise-option" data-ex-id="${exId}" data-role="${role}" data-value="${escapeHtml(rawInput)}">Use custom ${escapeHtml(role)}: ${escapeHtml(rawInput)}</button>`
      : '';

    const suggestionOptions = options
      .map(option => `<button type="button" class="exercise-option" data-ex-id="${exId}" data-role="${role}" data-value="${escapeHtml(option)}">${escapeHtml(option)}</button>`)
      .join('');

    if (!suggestionOptions && !customOption) {
      menu.innerHTML = `<div class="exercise-empty">No matches. Type a custom ${escapeHtml(role)} value.</div>`;
    } else {
      menu.innerHTML = customOption + suggestionOptions;
    }
  }

  if (forceOpen || document.activeElement === input) {
    menu.classList.add('is-open');
  }
}

function handleAutocompleteInput(exId, role) {
  renderAutocompleteMenu(exId, role, true);
  saveState();
}

function selectAutocompleteOption(exId, role, value) {
  const input = document.getElementById(`${role}-input-${exId}`);
  const menu = document.getElementById(`${role}-menu-${exId}`);
  if (!input || !menu) return;
  input.value = value;
  menu.classList.remove('is-open');
  input.focus();
  saveState();
}

function openAutocompleteMenu(exId, role) {
  renderAutocompleteMenu(exId, role, true);
}

function closeAllAutocompleteMenus() {
  document.querySelectorAll('.exercise-menu.is-open').forEach(menu => {
    menu.classList.remove('is-open');
  });
}

function toggleAutocompleteMenu(exId, role, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const menu = document.getElementById(`${role}-menu-${exId}`);
  const input = document.getElementById(`${role}-input-${exId}`);
  if (!menu || !input) return;
  const isOpen = menu.classList.contains('is-open');
  closeAllAutocompleteMenus();
  if (!isOpen) {
    input.focus();
    renderAutocompleteMenu(exId, role, true, true);
  }
}

function closeNotePopover(exId) {

function toggleNotePopover(exId, event) {

    event.stopPropagation();
  }
  const popover = document.getElementById(`note-popover-${exId}`);
  if (!popover) return;
  const isOpen = popover.classList.contains('is-open');

function removeExercise(exId) {

  const dayCard = row.closest('.day-card');

  if (dayCard) refreshDayLinkStates(dayCard.id);
  saveState();

function getPrintLinkState(rowsData, index) {
  const rowData = rowsData[index];
  if (!rowData.linkKey || rowData.linkGroupSize <= 1) return '';
  if (rowData.linkGroupPosition === 0) return 'pp-link-start';
  if (rowData.linkGroupPosition === rowData.linkGroupLength - 1) return 'pp-link-end';
  return 'pp-link-middle';
}

function formatDisplayDate(dateString) {
  if (!dateString) return '—';
  const date = new Date(`${dateString}T00:00:00`);
  if (Number.isNaN(date.getTime())) return dateString;
  return new Intl.DateTimeFormat('en-GB', {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  }).format(date);
}

function buildPrint() {
  const trainerName = TRAINER.name;
  const trainerPhone = TRAINER.phone;
  const trainerEmail = TRAINER.email;
  const clientName = document.getElementById('clientName').value || '—';
  const startDate = formatDisplayDate(document.getElementById('startDate').value);
  const weight = document.getElementById('clientWeight').value || '—';
  const height = document.getElementById('clientHeight').value || '—';
  const age = document.getElementById('clientAge').value || '—';
  const pre = document.getElementById('preWorkout').value || '';
  const post = document.getElementById('postWorkout').value || '';

  const days = document.querySelectorAll('.day-card');
  let daysHtml = '';
  days.forEach((day, i) => {
    const nameInput = day.querySelector('.day-title input');
    const dayName = nameInput ? nameInput.value || `DAY ${String(i+1).padStart(2,'0')}` : `DAY ${String(i+1).padStart(2,'0')}`;
    const rows = day.querySelectorAll('tbody tr');
    const rowsData = Array.from(rows).map(getRowData);
    let visualGroupIndex = 0;
    for (let rowIndex = 0; rowIndex < rowsData.length; ) {
      const rowData = rowsData[rowIndex];
      if (!rowData.linkKey) {
        rowIndex += 1;
        continue;
      }

      const groupSize = getLinkGroupSize(rowData.linkKey);
      const groupStart = rowIndex;
      const groupRows = [];
      while (
        rowIndex < rowsData.length &&
        groupRows.length < groupSize &&
        rowsData[rowIndex].linkKey === rowData.linkKey
      ) {
        groupRows.push(rowsData[rowIndex]);
        rowIndex += 1;
      }

      groupRows.forEach((groupRow, position) => {
        groupRow.linkGroupSize = groupSize;
        groupRow.linkGroupLength = groupRows.length;
        groupRow.linkGroupPosition = position;
        groupRow.linkVariant = visualGroupIndex % 2 === 1 ? 'alt' : 'base';
      });

      if (groupRows.length) visualGroupIndex += 1;
      if (!groupRows.length) rowIndex = groupStart + 1;
    }
    let rowsHtml = '';
    rowsData.forEach((rowData, rowIndex) => {
      const isLinked = Boolean(rowData.linkKey);
      const linkCell = rowData.linkType
        ? `<span class="pp-link-type">${escapeHtml(rowData.linkType)}</span>`
        : '—';
      const noteHtml = rowData.note
        ? `<span class="pp-exercise-note">${formatMultilineText(rowData.note)}</span>`
        : '';
      const rowClasses = [
        isLinked ? 'pp-linked' : '',
        rowData.linkVariant === 'alt' ? 'pp-linked-alt' : '',
        getPrintLinkState(rowsData, rowIndex)
      ].filter(Boolean).join(' ');
      rowsHtml += `<tr class="${rowClasses}"><td>${escapeHtml(rowData.muscle)}</td><td><strong>${escapeHtml(rowData.exercise)}</strong>${noteHtml}</td><td style="text-align:center;">${escapeHtml(rowData.sets)}</td><td style="text-align:center;">${escapeHtml(rowData.reps)}</td><td>${escapeHtml(rowData.tempo)}</td><td>${escapeHtml(rowData.rest)}</td><td>${linkCell}</td><td>${escapeHtml(rowData.technique)}</td></tr>`;
    });
    daysHtml += `
      <div class="pp-day">
        <div class="pp-day-header">
          <span class="pp-day-num">${String(i+1).padStart(2,'0')}</span>
          <span class="pp-day-name">${escapeHtml(dayName.toUpperCase())}</span>
        </div>
        <table class="pp-table">
          <thead><tr><th>MUSCLE</th><th>EXERCISE</th><th>SETS</th><th>REPS</th><th>TEMPO</th><th>REST</th><th>LINK</th><th>TECHNIQUE</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
  });

  const preHtml = pre ? `<div class="pp-notes"><strong style="font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:10px;">PRE-WORKOUT</strong><br>${formatMultilineText(pre)}</div>` : '';
  const postHtml = post ? `<div class="pp-post"><strong style="font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:10px;">POST-WORKOUT & NOTES</strong><br>${formatMultilineText(post)}</div>` : '';

  document.getElementById('printArea').innerHTML = `
    <div class="pp">
      <div class="pp-header">
        <div>
          <div class="pp-trainer-name">${escapeHtml(trainerName.toUpperCase())} <span>·</span> PT</div>
          <div class="pp-contact">${[trainerPhone, trainerEmail].filter(Boolean).map(escapeHtml).join(' &nbsp;|&nbsp; ')}</div>
        </div>
        <div>
          <div class="pp-title">FITSTRONOMY</div>
        </div>
      </div>
      <div class="pp-client-grid">
        <div class="pp-client-cell"><div class="pp-client-label">CLIENT</div><div class="pp-client-val">${escapeHtml(clientName)}</div></div>
        <div class="pp-client-cell"><div class="pp-client-label">START DATE</div><div class="pp-client-val">${escapeHtml(startDate)}</div></div>
        <div class="pp-client-cell"><div class="pp-client-label">WEIGHT / HEIGHT</div><div class="pp-client-val">${escapeHtml(weight)} kg / ${escapeHtml(height)} cm</div></div>
        <div class="pp-client-cell"><div class="pp-client-label">AGE</div><div class="pp-client-val">${escapeHtml(age)}</div></div>
      </div>
      ${preHtml}
      ${daysHtml}
      ${postHtml}
      <div class="pp-footer">PREPARED BY ${escapeHtml(trainerName.toUpperCase())} · EVIDENCE-BASED TRAINING PROTOCOL</div>
    </div>`;
}

window.addEventListener('beforeprint', buildPrint);
document.addEventListener("input", event => {
  if (event.target.matches("#clientName, #startDate, #clientWeight, #clientHeight, #clientAge, #preWorkout, #postWorkout")) {
    saveState();
  }
});

document.addEventListener("click", event => {
  const optionButton = event.target.closest('.exercise-option');
  if (optionButton) {
    selectAutocompleteOption(optionButton.dataset.exId, optionButton.dataset.role || "exercise", optionButton.dataset.value || "");
    return;
  }
  if (!event.target.closest('.exercise-autocomplete')) {
    closeAllAutocompleteMenus();
  }
  if (!event.target.closest('.note-popover') && !event.target.closest('.note-btn')) {
    closeAllNotePopovers();
  }
});

restoreState();
</script>
</body>
</html>
