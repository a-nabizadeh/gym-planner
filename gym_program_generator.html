<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Program Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Armin Nabizadeh <span>·</span> PT</div>
  <div class="topbar-actions">
    <div class="settings-wrap">
      <button class="gear-btn" type="button" onclick="toggleSettingsMenu(event)" aria-label="Open settings" title="Settings">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M10.3 2.6h3.4l.5 2.2a7.8 7.8 0 0 1 1.7.7l1.9-1.2 2.4 2.4-1.2 1.9c.3.5.5 1.1.7 1.7l2.2.5v3.4l-2.2.5a7.8 7.8 0 0 1-.7 1.7l1.2 1.9-2.4 2.4-1.9-1.2a7.8 7.8 0 0 1-1.7.7l-.5 2.2h-3.4l-.5-2.2a7.8 7.8 0 0 1-1.7-.7l-1.9 1.2-2.4-2.4 1.2-1.9a7.8 7.8 0 0 1-.7-1.7l-2.2-.5v-3.4l2.2-.5c.1-.6.4-1.2.7-1.7L3.8 6.7l2.4-2.4 1.9 1.2c.5-.3 1.1-.5 1.7-.7l.5-2.2z"></path>
          <circle cx="12" cy="12" r="3.2"></circle>
        </svg>
      </button>
      <div class="settings-menu" id="settingsMenu">
        <div class="theme-title">APPEARANCE</div>
        <button type="button" class="menu-action submenu-trigger" onclick="toggleThemeSubmenu(event)" onmouseenter="openThemeSubmenu(event)">
          <span>Theme</span>
          <span class="menu-action-meta">Palettes</span>
        </button>
        <div class="menu-divider"></div>
        <div class="theme-title">BRANDING</div>
        <button type="button" class="menu-action" onclick="triggerLogoUpload()">
          <span>Upload Logo</span>
          <span class="menu-action-meta" id="logoStatus">None</span>
        </button>
        <button type="button" class="menu-action" id="removeLogoBtn" onclick="clearStoredLogo()" style="display:none;">
          <span>Remove Logo</span>
        </button>
        <div class="menu-divider"></div>
        <div class="theme-title">CLIENTS</div>
        <button type="button" class="menu-action" onclick="saveClientProgram()">
          <span>Save Client Program</span>
        </button>
        <button type="button" class="menu-action" onclick="clearCurrentProgram()">
          <span>Clear Form</span>
        </button>
        <button type="button" class="menu-action" onclick="toggleArchivePanel()">
          <span>Client Archive</span>
          <span class="menu-action-meta" id="archiveCount">0</span>
        </button>
        <div class="archive-panel" id="archivePanel">
          <input type="text" class="archive-search" id="archiveSearch" placeholder="Search client, date, version..." oninput="renderArchiveList()">
          <div class="archive-list" id="archiveList"></div>
        </div>
        <div class="menu-divider"></div>
        <div class="theme-title">TEMPLATES</div>
        <button type="button" class="menu-action" onclick="saveProgramAsTemplate()">
          <span>Save Program as Template</span>
        </button>
        <button type="button" class="menu-action template-panel-trigger submenu-trigger" onclick="toggleTemplatePanel('day', event)" onmouseenter="openTemplatePanelFromMenu('day', event)">
          <span>Templates</span>
          <span class="menu-action-meta" id="templateSummaryCount">0</span>
        </button>
      </div>
      <div class="theme-submenu" id="themeSubmenu">
        <div class="theme-title">THEME PALETTES</div>
        <div id="themeOptions"></div>
      </div>
      <input type="file" id="logoUploadInput" accept="image/png,image/jpeg,image/webp,image/svg+xml" style="display:none;" onchange="handleLogoUpload(event)">
    </div>
    <button class="btn btn-primary" onclick="window.print()">Export PDF</button>
  </div>
</div>

<div class="floating-template-panel" id="templatePanel">
  <div class="template-panel-switcher">
    <button type="button" class="template-switch-btn is-active" id="dayTemplateSwitch" onclick="switchTemplatePanelType('day')">Days</button>
    <button type="button" class="template-switch-btn" id="programTemplateSwitch" onclick="switchTemplatePanelType('program')">Programs</button>
  </div>
  <div class="template-panel-context" id="templatePanelContext">Add a saved day template to the end of the program.</div>
  <input type="text" class="archive-search" id="templateSearch" placeholder="Search template name or day..." oninput="renderTemplateList()">
  <div class="archive-list" id="templateList"></div>
</div>

<div class="mobile-exercise-editor-backdrop" id="mobileExerciseEditorBackdrop" onclick="closeMobileExerciseEditor(event)">
  <div class="mobile-exercise-editor" id="mobileExerciseEditor" onclick="event.stopPropagation()">
    <div class="mobile-exercise-editor-head">
      <div class="mobile-exercise-editor-title">Edit Exercise</div>
      <button type="button" class="mobile-exercise-editor-close" onclick="closeMobileExerciseEditor(event)" aria-label="Close editor">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M6 6l12 12M18 6L6 18"></path>
        </svg>
      </button>
    </div>
    <div class="mobile-exercise-editor-body">
      <div class="field-row">
        <label>MUSCLE</label>
        <div class="mobile-picker">
          <button type="button" class="mobile-picker-toggle" id="mobileExerciseMusclePicker" onclick="toggleMobileEditorPicker('muscle', event)"></button>
          <div class="mobile-picker-menu" id="mobileExerciseMuscleMenu"></div>
        </div>
      </div>
      <div class="field-row">
        <label>EXERCISE</label>
        <div class="mobile-picker">
          <button type="button" class="mobile-picker-toggle" id="mobileExerciseExercisePicker" onclick="toggleMobileEditorPicker('exercise', event)"></button>
          <div class="mobile-picker-menu" id="mobileExerciseExerciseMenu"></div>
        </div>
      </div>
      <div class="two-col">
        <div class="field-row">
          <label>SETS</label>
          <div class="mobile-picker">
            <button type="button" class="mobile-picker-toggle" id="mobileExerciseSetsPicker" onclick="toggleMobileEditorPicker('sets', event)"></button>
            <div class="mobile-picker-menu" id="mobileExerciseSetsMenu"></div>
          </div>
        </div>
        <div class="field-row">
          <label>REPS</label>
          <div class="mobile-picker">
            <button type="button" class="mobile-picker-toggle" id="mobileExerciseRepsPicker" onclick="toggleMobileEditorPicker('reps', event)"></button>
            <div class="mobile-picker-menu" id="mobileExerciseRepsMenu"></div>
          </div>
        </div>
      </div>
      <div class="two-col">
        <div class="field-row">
          <label>TEMPO</label>
          <div class="mobile-picker">
            <button type="button" class="mobile-picker-toggle" id="mobileExerciseTempoPicker" onclick="toggleMobileEditorPicker('tempo', event)"></button>
            <div class="mobile-picker-menu" id="mobileExerciseTempoMenu"></div>
          </div>
        </div>
        <div class="field-row">
          <label>REST</label>
          <div class="mobile-picker">
            <button type="button" class="mobile-picker-toggle" id="mobileExerciseRestPicker" onclick="toggleMobileEditorPicker('rest', event)"></button>
            <div class="mobile-picker-menu" id="mobileExerciseRestMenu"></div>
          </div>
        </div>
      </div>
      <div class="two-col">
        <div class="field-row">
          <label>LINK</label>
          <div class="mobile-picker">
            <button type="button" class="mobile-picker-toggle" id="mobileExerciseLinkPicker" onclick="toggleMobileEditorPicker('link', event)"></button>
            <div class="mobile-picker-menu" id="mobileExerciseLinkMenu"></div>
          </div>
        </div>
        <div class="field-row">
          <label>TECHNIQUE</label>
          <div class="mobile-picker">
            <button type="button" class="mobile-picker-toggle" id="mobileExerciseTechniquePicker" onclick="toggleMobileEditorPicker('technique', event)"></button>
            <div class="mobile-picker-menu" id="mobileExerciseTechniqueMenu"></div>
          </div>
        </div>
      </div>
      <div class="field-row">
        <label>NOTE</label>
        <textarea id="mobileExerciseNote" placeholder="Add coaching cue, setup tip, or caution..."></textarea>
      </div>
    </div>
    <div class="mobile-exercise-editor-actions">
      <button type="button" class="btn btn-outline" onclick="closeMobileExerciseEditor(event)">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="saveMobileExerciseEditor()">Save Exercise</button>
    </div>
  </div>
</div>

<div class="container" id="app">

  <!-- TRAINER INFO -->
  <div style="margin-bottom:32px;">
    <div class="section-label">TRAINER</div>
    <div class="info-card" style="grid-column: span 2;">
      <div class="three-col trainer-primary-grid">
        <div class="field-row">
          <label>TRAINER NAME</label>
          <input type="text" id="trainerName" value="Armin Nabizadeh" readonly>
        </div>
        <div class="field-row">
          <label>PHONE / CONTACT</label>
          <input type="text" id="trainerPhone" value="+358 45 160 3940" readonly>
        </div>
        <div class="field-row">
          <label>EMAIL</label>
          <input type="text" id="trainerEmail" value="armin.nabizade@gmail.com" readonly>
        </div>
      </div>
      <div class="field-row" style="margin-top:10px;">
        <label>COMPANY</label>
        <input type="text" id="trainerCompany" value="FITSTRONOMY" placeholder="Company Name" onchange="saveState()">
      </div>
    </div>
  </div>

  <!-- CLIENT INFO -->
  <div style="margin-bottom:32px;">
    <div class="section-label">CLIENT</div>
    <div class="info-card">
      <div class="three-col client-primary-grid">
        <div class="field-row">
          <label>CLIENT NAME</label>
          <input type="text" id="clientName" placeholder="Client Full Name">
        </div>
        <div class="field-row">
          <label>PROGRAM START</label>
          <div class="date-input-wrap">
            <input type="date" id="startDate">
          </div>
        </div>
        <div class="field-row">
          <label>DURATION (weeks)</label>
          <select id="programDuration">
            <option value="2">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
      </div>
      <div class="three-col client-secondary-grid" style="margin-top:10px;">
        <div class="field-row">
          <label>WEIGHT (kg)</label>
          <input type="number" id="clientWeight" placeholder="75">
        </div>
        <div class="field-row">
          <label>HEIGHT (cm)</label>
          <input type="number" id="clientHeight" placeholder="175">
        </div>
        <div class="field-row">
          <label>AGE</label>
          <input type="number" id="clientAge" placeholder="30">
        </div>
        <div class="field-row mobile-only-client-email">
          <label>EMAIL</label>
          <input type="email" id="clientEmail" placeholder="client@example.com">
        </div>
      </div>
    </div>
  </div>

  <!-- PRE-WORKOUT -->
  <div class="notes-section">
    <div class="section-label">PRE-WORKOUT NOTES</div>
    <div class="info-card" style="padding:16px;">
      <textarea id="preWorkout" placeholder="e.g. Warm up for 5–10 minutes. Focus on mind-muscle connection and breathing..." style="background:transparent;border:none;color:var(--text);font-size:13px;width:100%;min-height:80px;resize:vertical;line-height:1.7;font-family:'Inter',sans-serif;outline:none;"></textarea>
    </div>
  </div>

  <!-- DAYS -->
  <div class="days-section" id="daysContainer" style="margin-top:28px;" ondragover="handleDayDragOver(event)">
    <div class="section-label" style="margin-bottom:16px;">TRAINING DAYS</div>
  </div>

  <div class="add-day-wrap no-print">
    <button class="add-day-btn" onclick="addDay()">＋ ADD TRAINING DAY</button>
  </div>

  <!-- POST-WORKOUT -->
  <div class="notes-section">
    <div class="section-label">POST-WORKOUT & GENERAL NOTES</div>
    <div class="info-card" style="padding:16px;">
      <textarea id="postWorkout" placeholder="e.g. Cool down and stretch target muscles. Focus on progressive overload each week..." style="background:transparent;border:none;color:var(--text);font-size:13px;width:100%;min-height:80px;resize:vertical;line-height:1.7;font-family:'Inter',sans-serif;outline:none;"></textarea>
    </div>
  </div>

</div>

<!-- PRINT PREVIEW (rendered on print) -->
<div class="print-preview" id="printArea"></div>

<script src="app.js"></script>

</body>
</html>
