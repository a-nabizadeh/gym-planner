<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Program Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #f3701e;
    --red-dark: #d85f12;
    --bg: #171717;
    --bg2: #1d1d1d;
    --bg3: #252a34;
    --bg4: #4b607f;
    --border: #2a2a2a;
    --border2: #3a4455;
    --text: #e8d8c9;
    --text2: #b8ab9f;
    --text3: #7f8896;
    --ink: #111111;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { background: var(--bg); }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOP BAR */
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border2); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-family: 'Oswald', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--text); }
  .topbar-logo span { color: var(--red); }
  .topbar-actions { display: flex; gap: 10px; align-items: stretch; }
  .settings-wrap { position: relative; display: flex; }
  .settings-wrap > .btn,
  .topbar-actions > .btn { min-height: 42px; }
  .settings-menu {
    display: none;
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    width: 260px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    box-shadow: 0 16px 32px rgba(0,0,0,0.35);
    padding: 10px;
    z-index: 120;
  }
  .settings-menu.is-open { display: block; }
  .theme-title {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    margin: 0 0 8px;
  }
  .menu-divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }
  .theme-option {
    width: 100%;
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 10px;
    align-items: center;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    border-radius: 10px;
    padding: 8px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .theme-option:hover,
  .theme-option.is-active {
    border-color: var(--border2);
    background: rgba(255,255,255,0.02);
  }
  .theme-swatches {
    display: flex;
    gap: 4px;
  }
  .theme-swatch {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .theme-name {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }
  .theme-meta {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.4px;
    margin-top: 2px;
  }
  .menu-action {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    text-align: left;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .menu-action:hover {
    border-color: var(--border2);
    background: rgba(255,255,255,0.02);
    color: var(--red);
  }
  .menu-action-meta {
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
  }
  .archive-panel {
    display: none;
    margin-top: 8px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .archive-panel.is-open { display: block; }
  .archive-search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 8px;
  }
  .archive-search:focus {
    outline: none;
    border-color: var(--red);
  }
  .archive-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 240px;
    overflow-y: auto;
  }
  .archive-empty {
    font-size: 11px;
    color: var(--text3);
    padding: 8px 2px 2px;
  }
  .archive-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: rgba(255,255,255,0.015);
  }
  .archive-item-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .archive-item-name {
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
  }
  .archive-item-date {
    font-size: 10px;
    color: var(--text3);
  }
  .archive-item-meta {
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
  }
  .archive-version {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 34px;
    padding: 2px 6px;
    border-radius: 999px;
    background: rgba(243,112,30,0.12);
    color: var(--red);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
  }
  .archive-item-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .archive-item-btn {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .archive-item-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,255,255,0.02);
  }
  .gear-btn {
    width: 48px;
    min-width: 48px;
    min-height: 48px !important;
    padding: 0;
    font-size: 36px;
    line-height: 1;
    border: none !important;
    background: transparent !important;
    color: var(--text2);
    box-shadow: none !important;
  }
  .gear-btn:hover {
    background: transparent !important;
    border: none !important;
    color: var(--red);
  }
  .btn { padding: 9px 18px; border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; min-height: 38px; transition: all 0.15s; }
  .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
  .btn-outline:hover { border-color: var(--red); color: var(--red); }
  .btn-primary { background: var(--red); color: var(--ink); font-weight: 800; font-size: 14px; }
  .btn-primary:hover { background: var(--red-dark); }
  .btn-danger { background: transparent; border: 1px solid var(--border2); color: var(--text3); font-size: 12px; padding: 6px 12px; }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }

  /* LAYOUT */
  .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
  .section-label { font-size: 13px; color: var(--red); letter-spacing: 2px; font-family: 'Oswald', sans-serif; margin-bottom: 8px; }

  /* TRAINER + CLIENT INFO */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .info-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .info-card h3 { font-family: 'Oswald', sans-serif; font-size: 14px; letter-spacing: 1px; color: var(--text2); margin-bottom: 16px; }
  .field-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-row label { font-size: 11px; color: var(--text3); letter-spacing: 1px; }
  .field-row input, .field-row select, .field-row textarea {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 8px 12px; font-size: 13px; font-family: 'Inter', sans-serif;
    transition: border-color 0.15s; width: 100%;
  }
  .field-row input:focus, .field-row select:focus, .field-row textarea:focus {
    outline: none; border-color: var(--red);
  }
  .field-row input::placeholder { color: var(--text3); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* NOTES */
  .notes-section { margin-bottom: 32px; }
  .notes-section textarea { min-height: 80px; resize: vertical; line-height: 1.6; }

  /* DAYS */
  .days-section { margin-bottom: 24px; }
  .day-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: visible; }
  .day-header { background: var(--bg3); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .day-header.dragging { opacity: 0.7; }
  .day-card.day-drop-target-before { box-shadow: 0 -3px 0 var(--red); }
  .day-card.day-drop-target-after { box-shadow: 0 3px 0 var(--red); }
  .day-title { font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 2px; color: var(--red); display: flex; align-items: center; gap: 10px; }
  .day-title input { background: transparent; border: none; color: var(--red); font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 2px; width: 180px; outline: none; }
  .day-body { padding: 16px 20px; }
  .day-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .day-drag-handle {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text3);
    cursor: grab;
    font-size: 18px;
    line-height: 1;
    padding: 6px 8px;
    border-radius: 6px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    touch-action: none;
  }
  .day-drag-handle:hover {
    color: var(--red);
    border-color: var(--border2);
    background: rgba(243,112,30,0.08);
  }

  /* EXERCISE TABLE */
  .ex-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .ex-table th { font-size: 10px; color: var(--text3); letter-spacing: 1px; text-align: left; padding: 0 6px 8px; font-weight: 500; border-bottom: 1px solid var(--border); }
  .ex-table td { padding: 6px 4px; vertical-align: middle; }
  .ex-table tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
  .ex-table select, .ex-table input[type="text"] {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 5px; padding: 6px 8px; font-size: 12px; font-family: 'Inter', sans-serif;
    width: 100%; transition: border-color 0.15s;
  }
  .ex-table select:focus, .ex-table input[type="text"]:focus { outline: none; border-color: var(--red); }
  .exercise-autocomplete { position: relative; }
  .exercise-input-wrap { position: relative; }
  .exercise-input-wrap input[type="text"] { padding-right: 34px; }
  .exercise-toggle {
    position: absolute;
    top: 50%;
    right: 6px;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }
  .exercise-toggle:hover { color: var(--red); }
  .exercise-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    max-height: 220px;
    overflow-y: auto;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    box-shadow: 0 12px 24px rgba(0,0,0,0.28);
    z-index: 20;
    padding: 6px;
  }
  .exercise-menu.is-open { display: block; }
  .exercise-option {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
  }
  .exercise-option:hover { background: var(--bg3); color: var(--red); }
  .exercise-empty {
    padding: 8px 10px;
    color: var(--text3);
    font-size: 12px;
  }
  .link-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(243,112,30,0.16);
    color: var(--red);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .ex-table tbody tr:not(.linked-row):nth-child(odd) td { background: var(--bg2); }
  .ex-table tbody tr:not(.linked-row):nth-child(even) td { background: var(--bg3); }
  .linked-row td { background: rgba(243,112,30,0.08); }
  .linked-row td:first-child { box-shadow: inset 3px 0 0 var(--red); }
  .linked-row.linked-alt td { background: rgba(232,216,201,0.1); }
  .linked-row.linked-alt td:first-child { box-shadow: inset 3px 0 0 var(--text); }
  .linked-start td { border-bottom-color: transparent !important; }
  .linked-middle td {
    border-top-color: transparent !important;
    border-bottom-color: transparent !important;
  }
  .linked-end td { border-top-color: transparent !important; }
  .row-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
  }
  .drag-handle {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text3);
    cursor: grab;
    font-size: 15px;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    touch-action: none;
  }
  .drag-handle:hover {
    color: var(--red);
    border-color: var(--border2);
    background: rgba(243,112,30,0.08);
  }
  .drag-handle:active { cursor: grabbing; }
  .ex-table tr.dragging {
    opacity: 0.5;
  }
  .ex-table tr.drop-target-before td {
    box-shadow: inset 0 2px 0 var(--red);
  }
  .ex-table tr.drop-target-after td {
    box-shadow: inset 0 -2px 0 var(--red);
  }
  .note-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 5px 7px;
    border-radius: 999px;
    transition: color 0.15s, opacity 0.15s, border-color 0.15s, background 0.15s, transform 0.15s;
    transform: scaleX(-1);
  }
  .note-btn:hover {
    color: var(--red);
    border-color: rgba(243,112,30,0.35);
    background: rgba(243,112,30,0.08);
    transform: translateY(-1px) scaleX(-1);
  }
  .note-btn.has-note {
    color: var(--red);
    border-color: rgba(243,112,30,0.45);
    background: rgba(243,112,30,0.12);
    box-shadow: inset 0 0 0 1px rgba(243,112,30,0.08);
  }
  .note-popover {
    display: none;
    position: absolute;
    right: 100%;
    top: 50%;
    transform: translate(-10px, -50%);
    width: 240px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    box-shadow: 0 14px 28px rgba(0,0,0,0.35);
    padding: 10px;
    z-index: 30;
  }
  .note-popover.is-open { display: block; }
  .note-popover-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .note-popover-title {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text3);
  }
  .note-close {
    background: transparent;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
  }
  .note-close:hover { color: var(--red); }
  .note-textarea {
    width: 100%;
    min-height: 88px;
    resize: vertical;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
  }
  .note-textarea:focus {
    outline: none;
    border-color: var(--red);
  }
  .ex-table .del-ex { background: transparent; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px; transition: opacity 0.15s; }
  .ex-table .del-ex:hover { opacity: 0.8; }
  .add-ex-btn { font-size: 12px; color: var(--red); background: transparent; border: 1px dashed var(--border); border-radius: 6px; padding: 7px 14px; cursor: pointer; transition: all 0.15s; }
  .add-ex-btn:hover { border-color: var(--red); background: rgba(243,112,30,0.08); }
  .day-footer { padding: 0 20px 16px; display: flex; justify-content: flex-end; }

  /* ADD DAY */
  .add-day-wrap { text-align: center; padding: 20px; border: 1px dashed var(--border); border-radius: 8px; margin-bottom: 32px; }
  .add-day-btn { font-family: 'Oswald', sans-serif; letter-spacing: 1px; font-size: 14px; color: var(--text2); background: transparent; border: none; cursor: pointer; padding: 8px 20px; transition: color 0.15s; }
  .add-day-btn:hover { color: var(--red); }

  /* PRINT PREVIEW */
  .print-preview { display: none; }

  /* PRINT STYLES */
  @media print {
    @page {
      size: auto;
      margin: 0;
    }
    html, body, .print-preview, .pp {
      background: var(--bg) !important;
      color: var(--text) !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body { background: var(--bg) !important; color: var(--text) !important; margin: 0 !important; }
    .topbar, .no-print { display: none !important; }
    .print-preview { display: block !important; }
    .container { display: none; }
    .print-preview {
      padding: 9mm;
      min-height: 100vh;
      background: var(--bg) !important;
    }
    .pp {
      font-family: 'Oswald', sans-serif;
      min-height: calc(100vh - 18mm);
      width: 100%;
      position: relative;
      background: var(--bg);
      padding-bottom: 9mm;
    }
    .pp::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 88% 12%, rgba(243,112,30,0.085), transparent 0 15%, rgba(243,112,30,0.045) 15.4%, transparent 15.8%, rgba(243,112,30,0.028) 25.6%, transparent 26%, rgba(243,112,30,0.02) 36%, transparent 36.5%),
        radial-gradient(circle at 8% 86%, rgba(232,216,201,0.055), transparent 0 11%, rgba(232,216,201,0.028) 11.4%, transparent 11.8%, rgba(232,216,201,0.018) 20%, transparent 20.5%);
      opacity: 1;
    }
    .pp.pp-has-logo::before {
      display: none;
    }
    .pp-logo-watermark {
      position: absolute;
      top: 6px;
      right: 20px;
      width: 245px;
      height: 144px;
      pointer-events: none;
      z-index: 2;
      opacity: 1.0;
      background-position: right top;
      background-repeat: no-repeat;
      background-size: contain;
      filter: none;
    }
    .pp-brand-mark {
      position: absolute;
      top: 20px;
      right: 28px;
      z-index: 2;
      text-align: right;
      color: var(--red);
      font-size: 13px;
      letter-spacing: 3px;
      font-weight: 600;
      pointer-events: none;
    }
    .pp > *:not(.pp-logo-watermark):not(.pp-brand-mark) {
      position: relative;
      z-index: 1;
    }
    .pp-header { background: var(--bg); color: var(--text); padding: 28px 32px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border2); }
    .pp-trainer-name { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
    .pp-trainer-name span { color: var(--red); }
    .pp-contact { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.8; }
    .pp-title { font-size: 13px; letter-spacing: 3px; color: var(--red); text-align: right; margin-bottom: 6px; visibility: hidden; }
    .pp-client-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid var(--border2); margin: 0; background: var(--bg); }
    .pp-client-cell { padding: 10px 14px; border-right: 1px solid var(--border2); }
    .pp-client-cell:last-child { border-right: none; }
    .pp-client-label { font-size: 9px; letter-spacing: 1px; color: var(--text3); margin-bottom: 3px; }
    .pp-client-val { font-size: 13px; font-weight: 600; color: var(--text); }
    .pp-notes { padding: 12px 16px; background: var(--bg); border-bottom: 2px solid var(--red); font-size: 11px; color: var(--text2); line-height: 1.7; font-family: 'Inter', sans-serif; }
    .pp-day {
      margin: 0 0 20px;
      padding-top: 8mm;
      break-inside: avoid;
      background: var(--bg);
    }
    .pp-day-header { background: var(--bg3); color: var(--text); padding: 8px 16px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border2); }
    .pp-day-num { color: var(--red); font-size: 18px; font-weight: 700; }
    .pp-day-name { font-size: 13px; letter-spacing: 2px; }
    .pp-table { width: 100%; border-collapse: collapse; font-family: 'Inter', sans-serif; font-size: 11px; }

  if (role === "muscle") {

  if (role === "exercise") {
    return exerciseOptions(getRowValue(row, "muscle"));
  }

function selectOpts(arr, selected='', placeholder='') {
  const ph = placeholder ? `<option value="">${placeholder}</option>` : '';
  return ph + arr.map(v => `<option value="${v}" ${v===selected?'selected':''}>${v}</option>`).join('');
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function formatMultilineText(value) {
  return escapeHtml(value).replace(/\n/g, "<br>");
}

function getStoredLogo() {

function applyTheme(themeId, shouldPersist = true) {
  const theme = THEMES[themeId] || THEMES.classic_dark;
  Object.entries(theme.vars).forEach(([name, value]) => {
    document.documentElement.style.setProperty(name, value);
  });
  if (shouldPersist) localStorage.setItem(THEME_STORAGE_KEY, themeId);
  renderThemeOptions(themeId);
  renderBrandingActions();
}

function handleLogoUpload(event) {

    localStorage.setItem(LOGO_STORAGE_KEY, result);
    renderBrandingActions();

  reader.readAsDataURL(file);

function getArchiveEntries() {
  try {
    const raw = localStorage.getItem(ARCHIVE_STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    console.error("Failed to read client archive", error);
    return [];
  }
}

function setArchiveEntries(entries) {
  localStorage.setItem(ARCHIVE_STORAGE_KEY, JSON.stringify(entries));
  renderArchiveList();
}

function toggleArchivePanel() {
  const panel = document.getElementById("archivePanel");
  if (!panel) return;
  panel.classList.toggle("is-open");
}

function renderArchiveList() {
  const archiveList = document.getElementById("archiveList");
  const archiveCount = document.getElementById("archiveCount");
  const archiveSearch = document.getElementById("archiveSearch");
  if (!archiveList) return;

  const searchQuery = (archiveSearch?.value || "").trim().toLowerCase();
  const entries = getArchiveEntries();
  if (archiveCount) archiveCount.textContent = String(entries.length);

  const filteredEntries = entries.filter(entry => {
    if (!searchQuery) return true;
    const haystack = [
      entry.clientName,
      entry.displayDate,
      entry.savedLabel,
      entry.versionLabel,
      entry.state?.client?.name
    ].join(" ").toLowerCase();
    return haystack.includes(searchQuery);
  });

  if (!filteredEntries.length) {
    archiveList.innerHTML = `<div class="archive-empty">${searchQuery ? "No archive results match your search." : "No saved client programs yet."}</div>`;
    return;
  }

  archiveList.innerHTML = filteredEntries
    .sort((a, b) => (b.savedAt || "").localeCompare(a.savedAt || ""))
    .map(entry => {
      const daysCount = Array.isArray(entry.state?.days) ? entry.state.days.length : 0;
      return `
        <div class="archive-item">
          <div class="archive-item-head">
            <div class="archive-item-name">${escapeHtml(entry.clientName || "Untitled Client")}</div>
            <div class="archive-version">${escapeHtml(entry.versionLabel || "v1")}</div>
          </div>
          <div class="archive-item-meta">${escapeHtml(entry.displayDate || "No date")} · ${daysCount} day${daysCount === 1 ? "" : "s"} · Saved ${escapeHtml(entry.savedLabel || "recently")}</div>
          <div class="archive-item-actions">
            <button type="button" class="archive-item-btn" onclick="loadArchivedProgram('${entry.id}')">Load</button>
            <button type="button" class="archive-item-btn" onclick="deleteArchivedProgram('${entry.id}')">Delete</button>
          </div>
        </div>
      `;
    })
    .join("");
}

function saveClientProgram() {
  const state = collectCurrentState();
  const clientName = (state.client?.name || "").trim() || "Untitled Client";
  const startDate = state.client?.startDate || "";
  const displayDate = startDate ? formatDisplayDate(startDate) : "No date";
  const savedAt = new Date().toISOString();
  const savedLabel = new Intl.DateTimeFormat('en-GB', {
    day: 'numeric',
    month: 'short',
    year: 'numeric'
  }).format(new Date(savedAt));
  const normalizedKey = `${clientName.toLowerCase()}`;
  const entries = getArchiveEntries();
  const existingVersions = entries.filter(entry => entry.key === normalizedKey);
  const nextVersion = existingVersions.length
    ? Math.max(...existingVersions.map(entry => Number(entry.version || 1))) + 1
    : 1;
  const archiveEntry = {
    id: `archive-${Date.now()}`,
    key: normalizedKey,
    clientName,
    displayDate,
    savedAt,
    savedLabel,
    version: nextVersion,
    versionLabel: `v${nextVersion}`,
    state
  };

  entries.push(archiveEntry);
  setArchiveEntries(entries);
  const panel = document.getElementById("archivePanel");
  if (panel) panel.classList.add("is-open");
}

function loadArchivedProgram(archiveId) {
  const entry = getArchiveEntries().find(item => item.id === archiveId);
  if (!entry?.state) return;
  hydrateState(entry.state);
  closeSettingsMenu();
}

function deleteArchivedProgram(archiveId) {
  const entries = getArchiveEntries().filter(entry => entry.id !== archiveId);
  setArchiveEntries(entries);
}

function restoreExerciseRow(row, rowData) {
  row.querySelector('[data-role="muscle"]').value = rowData.muscle || "";

function hydrateState(state) {
  try {
    dayCount = 0;
    exerciseCount = 0;

    document.getElementById("clientName").value = state.client?.name || "";
    document.getElementById("startDate").value = state.client?.startDate || "";
    document.getElementById("clientWeight").value = state.client?.weight || "";
    document.getElementById("clientHeight").value = state.client?.height || "";
    document.getElementById("clientAge").value = state.client?.age || "";
    document.getElementById("preWorkout").value = state.client?.preWorkout || "";
    document.getElementById("postWorkout").value = state.client?.postWorkout || "";
    document.getElementById("trainerCompany").value = state.trainer?.company || TRAINER.company;

    if (Array.isArray(state.days) && state.days.length) {
      state.days.forEach(dayData => {
        addDay();
        const day = document.querySelector(".day-card:last-child");
        day.querySelector(".day-title input").value = dayData.name || "";
        const tbody = day.querySelector("tbody");
        tbody.innerHTML = "";

        (dayData.exercises || []).forEach(exerciseData => {
          const row = addExercise(day.id, false);
          restoreExerciseRow(row, exerciseData);
        });

        if (!dayData.exercises?.length) addExercise(day.id, false);
      });
      exerciseCount = Math.max(exerciseCount, state.exerciseCount || 0);
      updateDayNumbers();
      saveState();
    } else {
      addDay();
    }
  } catch (error) {
    console.error("Failed to hydrate saved program", error);
    return false;
  }
  return true;
}

function restoreState() {
  const rawState = localStorage.getItem(STORAGE_KEY);
  if (!rawState) {
    addDay();
    return;
  }

  try {
    const state = JSON.parse(rawState);
    if (!hydrateState(state)) addDay();
  } catch (error) {
    console.error("Failed to restore saved program", error);
    addDay();
  }
}

function refreshDayLinkStates(dayId) {
  const tbody = document.getElementById('tbody-' + dayId);
  if (!tbody) return;

  const rows = Array.from(tbody.querySelectorAll('tr'));
  rows.forEach(row => {
    row.classList.remove('linked-row', 'linked-start', 'linked-middle', 'linked-end', 'linked-alt');
  });

  let index = 0;
  let visualGroupIndex = 0;
  while (index < rows.length) {
    const row = rows[index];
    const linkKey = getRowLinkKey(row);
    if (!linkKey) {
      index += 1;
      continue;
    }

    const groupSize = getLinkGroupSize(linkKey);
    const groupRows = [];
    let cursor = index;

    while (cursor < rows.length && groupRows.length < groupSize && getRowLinkKey(rows[cursor]) === linkKey) {
      groupRows.push(rows[cursor]);
      cursor += 1;
    }

    if (groupRows.length === 1) {
      groupRows[0].classList.add('linked-row');
      if (visualGroupIndex % 2 === 1) groupRows[0].classList.add('linked-alt');
      visualGroupIndex += 1;
      index += 1;
      continue;
    }

    groupRows.forEach((groupRow, groupIndex) => {
      groupRow.classList.add('linked-row');
      if (visualGroupIndex % 2 === 1) groupRow.classList.add('linked-alt');
      if (groupIndex === 0) groupRow.classList.add('linked-start');
      else if (groupIndex === groupRows.length - 1) groupRow.classList.add('linked-end');
      else groupRow.classList.add('linked-middle');
    });

    visualGroupIndex += 1;
    index += groupRows.length;
  }
}

function syncRowState(row) {
  if (!row) return;
  const dayCard = row.closest('.day-card');
  if (!dayCard) return;
  refreshDayLinkStates(dayCard.id);
}

function handleDayDragStart(dayId, event) {
  const day = document.getElementById(dayId);
  if (!day || !day.draggable) {

    return;
  }
  draggedDayId = dayId;
  day.querySelector('.day-header')?.classList.add('dragging');
  closeAllAutocompleteMenus();
  closeAllNotePopovers();
  if (event?.dataTransfer) {
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', dayId);
  }
}

function handleDayDragOver(event) {
  const container = document.getElementById('daysContainer');
  const draggedDay = draggedDayId ? document.getElementById(draggedDayId) : null;
  if (!container || !draggedDay || draggedDay.parentElement !== container) return;

  event.preventDefault();
  clearDayDropTargets();

  const dayCards = Array.from(container.querySelectorAll('.day-card')).filter(day => day !== draggedDay);
  let insertBeforeDay = null;

  for (const day of dayCards) {
    const rect = day.getBoundingClientRect();
    const midpoint = rect.top + rect.height / 2;
    if (event.clientY < midpoint) {
      insertBeforeDay = day;
      break;
    }
  }

  if (insertBeforeDay) {
    insertBeforeDay.classList.add('day-drop-target-before');
    container.insertBefore(draggedDay, insertBeforeDay);
  } else {
    const lastDay = dayCards[dayCards.length - 1];
    if (lastDay) lastDay.classList.add('day-drop-target-after');
    container.appendChild(draggedDay);
  }
}

function finishDayDrag(dayId) {

  const availableExercises = exerciseOptions(selectedMuscle);

  if (exerciseInput && exerciseInput.value && !availableExercises.includes(exerciseInput.value)) {
    exerciseInput.value = "";
  }

  renderAutocompleteMenu(exId, "exercise");
  saveState();
}

function renderAutocompleteMenu(exId, role, forceOpen = false, showAll = false) {
  const row = document.getElementById(exId);
  if (!row) return;
  const input = row.querySelector(`[data-role="${role}"]`);
  const menu = document.getElementById(`${role}-menu-${exId}`);
  if (!input || !menu) return;

  const rawInput = input.value.trim();
  const query = showAll ? "" : rawInput.toLowerCase();
  const optionsPool = presetOptions(role, row);
  const options = optionsPool.filter(option => option.toLowerCase().includes(query));
  const exactMatch = optionsPool.some(option => option.toLowerCase() === rawInput.toLowerCase());

  if (role === "exercise" && !getRowValue(row, "muscle")) {
    menu.innerHTML = '<div class="exercise-empty">Choose a muscle first</div>';
  } else {
    const allowCustom = role !== "muscle";
    const customOption = allowCustom && rawInput && !exactMatch
      ? `<button type="button" class="exercise-option" data-ex-id="${exId}" data-role="${role}" data-value="${escapeHtml(rawInput)}">Use custom ${escapeHtml(role)}: ${escapeHtml(rawInput)}</button>`
      : '';

    const suggestionOptions = options
      .map(option => `<button type="button" class="exercise-option" data-ex-id="${exId}" data-role="${role}" data-value="${escapeHtml(option)}">${escapeHtml(option)}</button>`)
      .join('');

    if (!suggestionOptions && !customOption) {
      menu.innerHTML = `<div class="exercise-empty">No matches. Type a custom ${escapeHtml(role)} value.</div>`;
    } else {
      menu.innerHTML = customOption + suggestionOptions;
    }
  }

  if (forceOpen || document.activeElement === input) {
    menu.classList.add('is-open');
  }
}

function handleAutocompleteInput(exId, role) {
  renderAutocompleteMenu(exId, role, true);
  saveState();
}

function lockAutocompleteMenu(exId, role, duration = 250) {
  const input = document.getElementById(`${role}-input-${exId}`);
  if (!input) return;
  input.dataset.menuLockedUntil = String(Date.now() + duration);
}

function isAutocompleteMenuLocked(exId, role) {
  const input = document.getElementById(`${role}-input-${exId}`);
  if (!input) return false;
  const lockedUntil = Number(input.dataset.menuLockedUntil || 0);
  return lockedUntil > Date.now();
}

function handleAutocompleteBlur(exId, role) {
  window.setTimeout(() => {
    const menu = document.getElementById(`${role}-menu-${exId}`);
    if (menu) menu.classList.remove('is-open');
  }, 0);
}

function handleAutocompleteKeydown(exId, role, event) {
  if (!event) return;
  if (event.key === "Enter") {
    event.preventDefault();
    const row = document.getElementById(exId);
    const input = document.getElementById(`${role}-input-${exId}`);
    const menu = document.getElementById(`${role}-menu-${exId}`);
    if (!row || !input || !menu) return;

    const rawValue = input.value.trim();
    const options = presetOptions(role, row);
    const exactMatch = options.find(option => option.toLowerCase() === rawValue.toLowerCase());
    const firstMatch = options.find(option => option.toLowerCase().includes(rawValue.toLowerCase()));

    if (role === "muscle") {
      const nextValue = exactMatch || firstMatch || "";
      input.value = nextValue;
      updateExercises(exId);
    } else {
      input.value = exactMatch || rawValue;
      saveState();
    }

    lockAutocompleteMenu(exId, role);
    menu.classList.remove('is-open');
    input.blur();
    return;
  }

  if (event.key === "Escape") {
    const menu = document.getElementById(`${role}-menu-${exId}`);
    if (menu) menu.classList.remove('is-open');
    event.target.blur();
  }
}

function selectAutocompleteOption(exId, role, value) {
  const input = document.getElementById(`${role}-input-${exId}`);
  const menu = document.getElementById(`${role}-menu-${exId}`);
  if (!input || !menu) return;
  input.value = value;
  lockAutocompleteMenu(exId, role);
  menu.classList.remove('is-open');
  if (role === "muscle") {
    updateExercises(exId);
  } else {
    saveState();
  }
  input.blur();
}

function openAutocompleteMenu(exId, role) {
  if (isAutocompleteMenuLocked(exId, role)) return;
  renderAutocompleteMenu(exId, role, true);
}

function closeAllAutocompleteMenus() {
  document.querySelectorAll('.exercise-menu.is-open').forEach(menu => {
    menu.classList.remove('is-open');
  });
}

function toggleAutocompleteMenu(exId, role, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const menu = document.getElementById(`${role}-menu-${exId}`);
  const input = document.getElementById(`${role}-input-${exId}`);
  if (!menu || !input) return;
  const isOpen = menu.classList.contains('is-open');
  closeAllAutocompleteMenus();
  if (!isOpen) {
    input.focus();
    renderAutocompleteMenu(exId, role, true, true);
  }
}

function updateNoteState(exId) {
  const row = document.getElementById(exId);
  if (!row) return;
  const noteButton = row.querySelector('.note-btn');
  const noteValue = getRowValue(row, 'note').trim();
  if (noteButton) noteButton.classList.toggle('has-note', Boolean(noteValue));
}

function handleNoteInput(exId) {
  updateNoteState(exId);
  saveState();
}

function closeAllNotePopovers() {
  document.querySelectorAll('.note-popover.is-open').forEach(popover => {
    popover.classList.remove('is-open');
  });
}

function handleAutocompleteOptionPointer(event) {
  const optionButton = event.target.closest('.exercise-option');
  if (!optionButton) return;
  event.preventDefault();
  event.stopPropagation();
  selectAutocompleteOption(
    optionButton.dataset.exId,
    optionButton.dataset.role || "exercise",
    optionButton.dataset.value || ""
  );
}

function closeNotePopover(exId) {
  const popover = document.getElementById(`note-popover-${exId}`);
  if (popover) popover.classList.remove('is-open');
}

function toggleNotePopover(exId, event) {
  if (event) {
    event.preventDefault();
    event.stopPropagation();
  }
  const popover = document.getElementById(`note-popover-${exId}`);
  if (!popover) return;
  const isOpen = popover.classList.contains('is-open');
  closeAllNotePopovers();
  if (!isOpen) popover.classList.add('is-open');
}

function removeDay(id) {
  const el = document.getElementById(id);
  if (el) {
    el.remove();
    updateDayNumbers();
    saveState();
  }
}

function removeExercise(exId) {
  const row = document.getElementById(exId);
  if (!row) return;
  const dayCard = row.closest('.day-card');
  row.remove();
  if (dayCard) refreshDayLinkStates(dayCard.id);
  saveState();
}

function getPrintLinkState(rowsData, index) {
  const rowData = rowsData[index];
  if (!rowData.linkKey || rowData.linkGroupSize <= 1) return '';
  if (rowData.linkGroupPosition === 0) return 'pp-link-start';
  if (rowData.linkGroupPosition === rowData.linkGroupLength - 1) return 'pp-link-end';
  return 'pp-link-middle';
}

function formatDisplayDate(dateString) {
  if (!dateString) return '—';
  const date = new Date(`${dateString}T00:00:00`);
  if (Number.isNaN(date.getTime())) return dateString;
  return new Intl.DateTimeFormat('en-GB', {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  }).format(date);
}

function slugifyFilenamePart(value, fallback) {
  return (value || fallback || "program")
    .trim()
    .replace(/[^A-Za-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '') || fallback;
}

function getPrintFilename() {
  const clientName = (document.getElementById('clientName')?.value || '').trim();
  const startDateValue = document.getElementById('startDate')?.value || '';
  const dateSource = startDateValue ? new Date(`${startDateValue}T00:00:00`) : new Date();
  const monthYear = Number.isNaN(dateSource.getTime())
    ? new Intl.DateTimeFormat('en-GB', { month: 'long', year: 'numeric' }).format(new Date())
    : new Intl.DateTimeFormat('en-GB', { month: 'long', year: 'numeric' }).format(dateSource);

  return `${slugifyFilenamePart(clientName, 'client')}_${slugifyFilenamePart(monthYear, 'month-year')}.pdf`;
}

function preparePrintTitle() {
  document.title = getPrintFilename();
}

function restorePrintTitle() {
  document.title = defaultDocumentTitle;
}

function buildPrint() {
  const trainerName = TRAINER.name;
  const trainerPhone = TRAINER.phone;
  const trainerEmail = TRAINER.email;
  const trainerCompany = (document.getElementById('trainerCompany')?.value || TRAINER.company || 'FITSTRONOMY').trim() || 'FITSTRONOMY';
  const logoData = getStoredLogo();
  const clientName = document.getElementById('clientName').value || '—';
  const startDate = formatDisplayDate(document.getElementById('startDate').value);
  const weight = document.getElementById('clientWeight').value || '—';
  const height = document.getElementById('clientHeight').value || '—';
  const age = document.getElementById('clientAge').value || '—';
  const pre = document.getElementById('preWorkout').value || '';
  const post = document.getElementById('postWorkout').value || '';

  const days = document.querySelectorAll('.day-card');
  let daysHtml = '';
  days.forEach((day, i) => {
    const nameInput = day.querySelector('.day-title input');
    const dayName = nameInput ? nameInput.value || `DAY ${String(i+1).padStart(2,'0')}` : `DAY ${String(i+1).padStart(2,'0')}`;
    const rows = day.querySelectorAll('tbody tr');
    const rowsData = Array.from(rows).map(getRowData);
    let visualGroupIndex = 0;
    for (let rowIndex = 0; rowIndex < rowsData.length; ) {
      const rowData = rowsData[rowIndex];
      if (!rowData.linkKey) {
        rowIndex += 1;
        continue;
      }

      const groupSize = getLinkGroupSize(rowData.linkKey);
      const groupStart = rowIndex;
      const groupRows = [];
      while (
        rowIndex < rowsData.length &&
        groupRows.length < groupSize &&
        rowsData[rowIndex].linkKey === rowData.linkKey
      ) {
        groupRows.push(rowsData[rowIndex]);
        rowIndex += 1;
      }

      groupRows.forEach((groupRow, position) => {
        groupRow.linkGroupSize = groupSize;
        groupRow.linkGroupLength = groupRows.length;
        groupRow.linkGroupPosition = position;
        groupRow.linkVariant = visualGroupIndex % 2 === 1 ? 'alt' : 'base';
      });

      if (groupRows.length) visualGroupIndex += 1;
      if (!groupRows.length) rowIndex = groupStart + 1;
    }
    let rowsHtml = '';
    rowsData.forEach((rowData, rowIndex) => {
      const isLinked = Boolean(rowData.linkKey);
      const linkCell = rowData.linkType
        ? `<span class="pp-link-type">${escapeHtml(rowData.linkType)}</span>`
        : '—';
      const noteHtml = rowData.note
        ? `<span class="pp-exercise-note">${formatMultilineText(rowData.note)}</span>`
        : '';
      const rowClasses = [
        isLinked ? 'pp-linked' : '',
        rowData.linkVariant === 'alt' ? 'pp-linked-alt' : '',
        getPrintLinkState(rowsData, rowIndex)
      ].filter(Boolean).join(' ');
      rowsHtml += `<tr class="${rowClasses}"><td>${escapeHtml(rowData.muscle)}</td><td><strong>${escapeHtml(rowData.exercise)}</strong>${noteHtml}</td><td style="text-align:center;">${escapeHtml(rowData.sets)}</td><td style="text-align:center;">${escapeHtml(rowData.reps)}</td><td>${escapeHtml(rowData.tempo)}</td><td>${escapeHtml(rowData.rest)}</td><td>${linkCell}</td><td>${escapeHtml(rowData.technique)}</td></tr>`;
    });
    daysHtml += `
      <div class="pp-day">
        <div class="pp-day-header">
          <span class="pp-day-num">${String(i+1).padStart(2,'0')}</span>
          <span class="pp-day-name">${escapeHtml(dayName.toUpperCase())}</span>
        </div>
        <table class="pp-table">
          <thead><tr><th>MUSCLE</th><th>EXERCISE</th><th>SETS</th><th>REPS</th><th>TEMPO</th><th>REST</th><th>LINK</th><th>TECHNIQUE</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
  });

  const preHtml = pre ? `<div class="pp-notes"><strong style="font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:10px;">PRE-WORKOUT</strong><br>${formatMultilineText(pre)}</div>` : '';
  const postHtml = post ? `<div class="pp-post"><strong style="font-family:'Oswald',sans-serif;letter-spacing:1px;font-size:10px;">POST-WORKOUT & NOTES</strong><br>${formatMultilineText(post)}</div>` : '';

  document.getElementById('printArea').innerHTML = `
    <div class="pp ${logoData ? 'pp-has-logo' : ''}">
      ${logoData ? `<div class="pp-logo-watermark" aria-hidden="true"></div>` : ''}
      ${logoData ? '' : `<div class="pp-brand-mark">${escapeHtml(trainerCompany.toUpperCase())}</div>`}
      <div class="pp-header">
        <div>
          <div class="pp-trainer-name">${escapeHtml(trainerName.toUpperCase())} <span>·</span> PT</div>
          <div class="pp-contact">${[trainerPhone, trainerEmail].filter(Boolean).map(escapeHtml).join(' &nbsp;|&nbsp; ')}</div>
        </div>
        <div>
          <div class="pp-title">FITSTRONOMY</div>
        </div>
      </div>
      <div class="pp-client-grid">
        <div class="pp-client-cell"><div class="pp-client-label">CLIENT</div><div class="pp-client-val">${escapeHtml(clientName)}</div></div>
        <div class="pp-client-cell"><div class="pp-client-label">START DATE</div><div class="pp-client-val">${escapeHtml(startDate)}</div></div>
        <div class="pp-client-cell"><div class="pp-client-label">WEIGHT / HEIGHT</div><div class="pp-client-val">${escapeHtml(weight)} kg / ${escapeHtml(height)} cm</div></div>
        <div class="pp-client-cell"><div class="pp-client-label">AGE</div><div class="pp-client-val">${escapeHtml(age)}</div></div>
      </div>
      ${preHtml}
      ${daysHtml}
      ${postHtml}
      <div class="pp-footer">PREPARED BY ${escapeHtml(trainerName.toUpperCase())} · EVIDENCE-BASED TRAINING PROTOCOL</div>
    </div>`;

  if (logoData) {
    const watermark = document.querySelector('.pp-logo-watermark');
    if (watermark) {
      watermark.style.backgroundImage = `url("${logoData}")`;
    }
  }
}

window.addEventListener('beforeprint', () => {
  preparePrintTitle();
  buildPrint();
});
window.addEventListener('afterprint', restorePrintTitle);
document.addEventListener("input", event => {
  if (event.target.matches("#clientName, #startDate, #clientWeight, #clientHeight, #clientAge, #preWorkout, #postWorkout, #trainerCompany")) {
    saveState();
  }
});

document.addEventListener("pointerdown", handleAutocompleteOptionPointer);
document.addEventListener("mousedown", handleAutocompleteOptionPointer);

document.addEventListener("click", event => {
  const themeButton = event.target.closest('.theme-option');
  if (themeButton) {
    applyTheme(themeButton.dataset.themeId || "classic_dark");
    closeSettingsMenu();
    return;
  }
  if (!event.target.closest('.settings-wrap')) {
    closeSettingsMenu();
  }
  if (!event.target.closest('.exercise-autocomplete')) {
    closeAllAutocompleteMenus();
  }
  if (!event.target.closest('.note-popover') && !event.target.closest('.note-btn')) {
    closeAllNotePopovers();
  }
});

applyTheme(getCurrentThemeId(), false);
renderBrandingActions();
renderArchiveList();
restoreState();
</script>
</body>
</html>
